services:
  - type: web
    name: apc-polytech
    env: node
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: apc-polytech-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BOT_API_KEY
        generateValue: true
      - key: BOT_TOKEN
        sync: false

databases:
  - name: apc-polytech-db
    databaseName: college_achievements
    user: apc_user
    plan: free
